name: Deploy API produtos

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/products-api:${{ github.sha }}

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_TEST }}
          username: "ubuntu"
          key: ${{ secrets.KEY_TEST }}
          port: 22
          script: |
            docker stop products-api transactions-api || true
            docker rm --force products-api transactions-api || true
            docker ps -q --filter publish=8080 | xargs -r docker stop
            docker pull ${{ secrets.DOCKER_USER }}/products-api:${{ github.sha }}
            docker run -d -p 8080:5000 \
              -e MONGO_URL='${{ secrets.MONGO_URL }}' \
              -e AUTH0_DOMAIN='${{ secrets.AUTH0_DOMAIN }}' \
              -e AUTH0_AUDIENCE='${{ secrets.AUTH0_AUDIENCE }}' \
              -e AUTH0_ROLES_CLAIM='${{ secrets.AUTH0_ROLES_CLAIM }}' \
              --name products-api \
              ${{ secrets.DOCKER_USER }}/products-api:${{ github.sha }}
